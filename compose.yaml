services:
  althuntarrrscript:
    image: h5k8/althuntarr:latest
    build:
      context: .
    container_name: althuntarrrscript
    restart: unless-stopped
    environment:
      PUID: "${PUID:-99}"
      PGID: "${PGID:-100}"
      TZ: "${TZ:-UTC}"
      ALTHUNTARR_INTERVAL: "${ALTHUNTARR_INTERVAL:-900}"
      ALTHUNTARR_DRY_RUN: "${ALTHUNTARR_DRY_RUN:-true}"
      ALTHUNTARR_SHOW_CANDIDATES: "${ALTHUNTARR_SHOW_CANDIDATES:-false}"
      ALTHUNTARR_SONARR_URL: "${ALTHUNTARR_SONARR_URL:-}"
      ALTHUNTARR_RADARR_URL: "${ALTHUNTARR_RADARR_URL:-}"
      SONARR_API_KEY: "${SONARR_API_KEY:-}"
      RADARR_API_KEY: "${RADARR_API_KEY:-}"
    volumes:
      - ./config:/config
      - ./data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "/usr/local/bin/docker-entrypoint.sh", "healthcheck"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
